name: Run ShellCheck

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/**
      - .github/workflows/shellcheck.yml
  pull_request:
    paths:
      - scripts/**
      - .github/workflows/shellcheck.yml

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install ShellCheck
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck
    - name: Run ShellCheck
      run: |
        shellcheck scripts/*.sh
