<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VLM RKNN</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f5;
      --panel: #ffffff;
      --text: #19211d;
      --muted: #5f6b63;
      --line: #d9ded8;
      --accent: #1d6f5f;
      --accent-strong: #155548;
      --danger: #9f2d20;
      --shadow: 0 14px 34px rgba(31, 43, 36, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1;
      font-weight: 750;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      text-align: right;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 420px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    form,
    .output {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    form {
      padding: 18px;
    }

    label {
      display: block;
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    select,
    textarea,
    input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    select,
    input[type="file"] {
      min-height: 42px;
      padding: 8px 10px;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
      padding: 10px 12px;
    }

    .field {
      margin-bottom: 15px;
    }

    .image-preview {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #eef1ee;
      display: none;
      margin-top: 10px;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
      margin-top: 18px;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 700;
      padding: 0 18px;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-strong);
    }

    button:disabled {
      cursor: progress;
      opacity: 0.65;
    }

    .output {
      min-height: 520px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .output-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    pre {
      flex: 1;
      margin: 0;
      padding: 16px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .error {
      color: var(--danger);
    }

    @media (max-width: 820px) {
      main {
        width: min(100vw - 20px, 680px);
        padding: 18px 0;
      }

      header,
      .workspace {
        display: block;
      }

      .status {
        margin-top: 8px;
        text-align: left;
      }

      .output {
        min-height: 360px;
        margin-top: 14px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>VLM RKNN</h1>
      <div id="status" class="status">Loading models...</div>
    </header>

    <div class="workspace">
      <form id="query-form">
        <div class="field">
          <label for="model">Model</label>
          <select id="model" name="model"></select>
        </div>

        <div class="field">
          <label for="prompt">Prompt</label>
          <textarea id="prompt" name="prompt" required><image>What is in the image?</textarea>
        </div>

        <div class="field">
          <label for="image">Image</label>
          <input id="image" name="image" type="file" accept="image/png,image/jpeg">
          <img id="preview" class="image-preview" alt="">
        </div>

        <div class="actions">
          <button id="submit" type="submit">Run</button>
        </div>
      </form>

      <section class="output" aria-live="polite">
        <div class="output-title">
          <span>Response</span>
          <span id="elapsed"></span>
        </div>
        <pre id="response"></pre>
      </section>
    </div>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const modelEl = document.getElementById('model');
    const promptEl = document.getElementById('prompt');
    const imageEl = document.getElementById('image');
    const previewEl = document.getElementById('preview');
    const responseEl = document.getElementById('response');
    const elapsedEl = document.getElementById('elapsed');
    const submitEl = document.getElementById('submit');
    const formEl = document.getElementById('query-form');

    let selectedImageData = null;

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle('error', isError);
    }

    function setResponse(message, isError = false) {
      responseEl.textContent = message;
      responseEl.classList.toggle('error', isError);
    }

    async function loadModels() {
      try {
        const res = await fetch('/models');
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || `HTTP ${res.status}`);
        }

        modelEl.replaceChildren();
        for (const id of data.models || []) {
          const option = document.createElement('option');
          option.value = id;
          option.textContent = id === data.default ? `${id} (default)` : id;
          if (id === data.default) {
            option.selected = true;
          }
          modelEl.append(option);
        }

        setStatus(`${(data.models || []).length} model(s) available`);
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    function readImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error('Could not read image.'));
        reader.onload = () => {
          const result = String(reader.result || '');
          const comma = result.indexOf(',');
          resolve(comma >= 0 ? result.slice(comma + 1) : result);
        };
        reader.readAsDataURL(file);
      });
    }

    imageEl.addEventListener('change', async () => {
      const file = imageEl.files && imageEl.files[0];
      selectedImageData = null;
      previewEl.removeAttribute('src');
      previewEl.style.display = 'none';

      if (!file) {
        return;
      }

      if (file.size > 1024 * 1024) {
        imageEl.value = '';
        setStatus('Image exceeds the 1 MB upload limit.', true);
        return;
      }

      try {
        selectedImageData = await readImage(file);
        previewEl.src = URL.createObjectURL(file);
        previewEl.style.display = 'block';
        setStatus(`Selected ${file.name}`);
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    formEl.addEventListener('submit', async (event) => {
      event.preventDefault();
      const start = performance.now();
      elapsedEl.textContent = '';
      submitEl.disabled = true;
      setStatus('Running...');
      setResponse('');

      let prompt = promptEl.value.trim();
      if (selectedImageData && !prompt.includes('<image>')) {
        prompt = `<image>${prompt ? ' ' + prompt : ''}`;
        promptEl.value = prompt;
      }

      const body = {
        model_id: modelEl.value,
        prompt
      };
      if (selectedImageData) {
        body.image_data = selectedImageData;
      }

      try {
        const res = await fetch('/query', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || `HTTP ${res.status}`);
        }
        setResponse(data.text || '');
        setStatus('Ready');
      } catch (error) {
        setResponse(error.message, true);
        setStatus('Request failed', true);
      } finally {
        submitEl.disabled = false;
        elapsedEl.textContent = `${((performance.now() - start) / 1000).toFixed(1)}s`;
      }
    });

    loadModels();
  </script>
</body>
</html>
