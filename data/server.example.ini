# Example configuration for vlm-rknn-server.
#
# Each [model_id] section defines a model. The section name is the identifier
# clients pass as "model_id" in a /query request. The first model defined is
# the default and is used when a request omits "model_id".
#
# Recognised keys mirror the command-line options, with underscores instead of
# hyphens:
#   model_family     one of: qwen2-vl, qwen2.5-vl, qwen3-vl, llama, smolvlm2
#   vision           path to the vision encoder (.rknn); required for vision models
#   llm              path to the language model (.rkllm); required
#   max_new_tokens   maximum tokens to generate (default 128)
#   max_context_len  maximum context length (default 2048)
#   cores            number of NPU cores to use, 1-3

[qwen2-vl]
model_family=qwen2-vl
vision=/models/qwen2-vl/vision.rknn
llm=/models/qwen2-vl/Qwen2-VL-Instruct.rkllm
max_new_tokens=300

[smolvlm2]
model_family=smolvlm2
vision=/models/smolvlm2/vision.rknn
llm=/models/smolvlm2/SmolVLM2.rkllm

[chat]
model_family=llama
llm=/models/llama/Llama-3.2.rkllm
cores=3
